<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SYNC | Ops</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: { base: '#050505', surface: '#0f0f0f', border: '#1f1f1f' }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        body { background-color: #050505; font-family: 'Inter', sans-serif; color: #eee; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        
        /* Premium Layout Anchors */
        .lane { background: #0f0f0f; border: 1px solid #1f1f1f; border-radius: 4px; display: flex; flex-direction: column; height: 100%; }
        .card { background: #050505; border: 1px solid #1f1f1f; border-radius: 4px; transition: border 0.2s; cursor: pointer; }
        .card:hover { border-color: #444; }
        
        /* Status Badges */
        .badge-critical { color: #ff4d4d; border: 1px solid rgba(255, 77, 77, 0.3); background: rgba(255, 77, 77, 0.05); }
        .badge-high { color: #ffb84d; border: 1px solid rgba(255, 184, 77, 0.3); background: rgba(255, 184, 77, 0.05); }
        
        /* Side Drawer Control */
        #peekDrawer { transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .drawer-open { transform: translateX(0) !important; }
    </style>
</head>
<body class="h-screen w-screen overflow-hidden flex flex-col">

    <div id="lockScreen" class="fixed inset-0 z-[100] bg-base flex flex-col items-center justify-center transition-opacity duration-500">
        <h1 class="text-2xl font-extrabold tracking-[0.4em] mb-12 uppercase text-white">SYNC</h1>
        <div class="bg-surface border border-border p-8 rounded-lg w-72 shadow-2xl">
            <div class="flex justify-center gap-4 mb-8" id="pinDots">
                <div class="h-1.5 w-1.5 rounded-full bg-border" id="dot-1"></div>
                <div class="h-1.5 w-1.5 rounded-full bg-border" id="dot-2"></div>
                <div class="h-1.5 w-1.5 rounded-full bg-border" id="dot-3"></div>
                <div class="h-1.5 w-1.5 rounded-full bg-border" id="dot-4"></div>
            </div>
            <div class="grid grid-cols-3 gap-4" id="numpad">
                <button class="pin-btn h-12 text-lg font-bold hover:bg-white/5 rounded" data-val="1">1</button>
                <button class="pin-btn h-12 text-lg font-bold hover:bg-white/5 rounded" data-val="2">2</button>
                <button class="pin-btn h-12 text-lg font-bold hover:bg-white/5 rounded" data-val="3">3</button>
                <button class="pin-btn h-12 text-lg font-bold hover:bg-white/5 rounded" data-val="4">4</button>
                <button class="pin-btn h-12 text-lg font-bold hover:bg-white/5 rounded" data-val="5">5</button>
                <button class="pin-btn h-12 text-lg font-bold hover:bg-white/5 rounded" data-val="6">6</button>
                <button class="pin-btn h-12 text-lg font-bold hover:bg-white/5 rounded" data-val="7">7</button>
                <button class="pin-btn h-12 text-lg font-bold hover:bg-white/5 rounded" data-val="8">8</button>
                <button class="pin-btn h-12 text-lg font-bold hover:bg-white/5 rounded" data-val="9">9</button>
                <button class="col-start-2 pin-btn h-12 text-lg font-bold hover:bg-white/5 rounded" data-val="0">0</button>
            </div>
            <p id="pinError" class="text-[9px] font-bold text-red-500 uppercase tracking-widest text-center mt-6 opacity-0">Error</p>
        </div>
    </div>

    <header class="h-14 border-b border-border flex items-center justify-between px-6 bg-base z-50">
        <span class="text-xs font-black tracking-widest text-white uppercase">SYNC Command</span>
        <div class="flex items-center gap-4">
            <span id="activeUserName" class="text-[10px] font-bold uppercase tracking-tighter text-white/40">Offline</span>
            <button onclick="lockStation()" class="text-white/20 hover:text-white"><i class="fa-solid fa-power-off text-xs"></i></button>
        </div>
    </header>

    <main class="flex-1 overflow-x-auto p-4 flex gap-4 scrollbar-hide bg-base">
        <div class="w-[280px] shrink-0 flex flex-col h-full"><div class="lane p-3"><h2 class="text-[9px] font-black uppercase tracking-widest mb-3 text-white/30">Radar</h2><div id="col-Radar" class="flex-1 space-y-2 overflow-y-auto scrollbar-hide"></div></div></div>
        <div class="w-[280px] shrink-0 flex flex-col h-full"><div class="lane p-3"><h2 class="text-[9px] font-black uppercase tracking-widest mb-3 text-white">Assigned</h2><div id="col-Assigned To" class="flex-1 space-y-2 overflow-y-auto scrollbar-hide"></div></div></div>
        <div class="w-[280px] shrink-0 flex flex-col h-full"><div class="lane p-3"><h2 class="text-[9px] font-black uppercase tracking-widest mb-3 text-white/50">In Progress</h2><div id="col-In Progress" class="flex-1 space-y-2 overflow-y-auto scrollbar-hide"></div></div></div>
        <div class="w-[280px] shrink-0 flex flex-col h-full"><div class="lane p-3"><h2 class="text-[9px] font-black uppercase tracking-widest mb-3 text-white/20">Completed</h2><div id="col-Completed" class="flex-1 space-y-2 overflow-y-auto scrollbar-hide opacity-50"></div></div></div>
    </main>
    <button onclick="openCreateModal()" class="fixed bottom-6 right-6 h-12 w-12 bg-white text-black rounded shadow-2xl flex items-center justify-center transition-transform active:scale-90 z-[60]">
        <i class="fa-solid fa-plus text-sm"></i>
    </button>

    <div id="createModal" class="fixed inset-0 z-[80] bg-black/90 hidden items-center justify-center p-4">
        <div class="bg-surface border border-border w-full max-w-sm p-6 rounded shadow-2xl">
            <h3 class="text-xs font-black uppercase tracking-widest mb-6">New Directive</h3>
            <input type="text" id="pulseTitle" placeholder="Title" class="w-full bg-base border border-border h-11 px-4 text-xs mb-3 rounded outline-none focus:border-white/20">
            <input type="text" id="pulseTarget" list="rosterList" placeholder="Entity" class="w-full bg-base border border-border h-11 px-4 text-xs mb-3 rounded outline-none focus:border-white/20">
            <datalist id="rosterList"></datalist>
            <div class="grid grid-cols-2 gap-3 mb-6">
                <select id="pulseTL" class="bg-base border border-border h-11 px-3 text-[10px] rounded outline-none text-white uppercase font-bold"><option value="None">Assign</option></select>
                <select id="pulsePriority" class="bg-base border border-border h-11 px-3 text-[10px] rounded outline-none text-white uppercase font-bold"><option value="Standard">Standard</option><option value="High">High</option><option value="Critical">Critical</option></select>
            </div>
            <div class="flex gap-2">
                <button onclick="closeCreateModal()" class="flex-1 h-11 text-[9px] uppercase font-bold tracking-widest border border-border rounded">Cancel</button>
                <button id="executeBtn" class="flex-1 h-11 text-[9px] uppercase font-bold tracking-widest bg-white text-black rounded">Sync</button>
            </div>
        </div>
    </div>

    <div id="peekDrawer" class="fixed top-0 right-0 h-full w-full sm:w-80 bg-surface border-l border-border z-[90] translate-x-full flex flex-col shadow-2xl">
        <div class="p-6 border-b border-border flex justify-between items-center">
            <span class="text-[9px] font-black uppercase tracking-widest text-white/30" id="peekEntity">#Entity</span>
            <button onclick="closePeek()" class="text-white/40 hover:text-white"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <div class="flex-1 p-6 flex flex-col gap-6">
            <h2 id="peekTitle" class="text-sm font-bold leading-tight">Task Title</h2>
            
            <div>
                <label class="text-[8px] font-black uppercase tracking-widest text-white/30 mb-3 block">Tactical Status</label>
                <div class="grid grid-cols-2 gap-2">
                    <button onclick="updateStatus('Radar')" class="h-10 bg-base border border-border text-[9px] font-bold uppercase rounded hover:bg-white/5">Radar</button>
                    <button onclick="updateStatus('Assigned To')" class="h-10 bg-base border border-border text-[9px] font-bold uppercase rounded hover:bg-white/5">Assign</button>
                    <button onclick="updateStatus('In Progress')" class="h-10 bg-base border border-border text-[9px] font-bold uppercase rounded hover:bg-white/5">Progress</button>
                    <button onclick="updateStatus('Completed')" class="h-10 bg-base border border-border text-[9px] font-bold uppercase rounded hover:bg-white/5 text-green-500">Done</button>
                </div>
            </div>

            <div class="flex-1 flex flex-col">
                <label class="text-[8px] font-black uppercase tracking-widest text-white/30 mb-3 block">Operational Notes</label>
                <textarea id="peekNotes" class="flex-1 w-full bg-base border border-border rounded p-4 text-xs outline-none focus:border-white/10 resize-none"></textarea>
                <button id="commitNoteBtn" class="mt-3 h-10 bg-white/5 border border-border text-[9px] font-black uppercase rounded hover:bg-white/10">Save Note</button>
            </div>
        </div>
        <div class="p-4 bg-base/50">
            <button id="archiveBtn" class="w-full h-10 text-[9px] font-black uppercase text-red-500/50 hover:text-red-500">Archive Task</button>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // --- CORE CONFIG ---
        const supabaseUrl = 'https://pmhmuzctbstrhtmwxlay.supabase.co';
        const supabaseKey = 'sb_publishable_8dtRYPrztDbEt3bZhU3ibQ_5PAt_FsP';
        const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

        let currentUser = null;
        let currentPin = '';
        let activePeekId = null;

        // UI Helpers
        function openCreateModal() { document.getElementById('createModal').style.display = 'flex'; }
        function closeCreateModal() { document.getElementById('createModal').style.display = 'none'; }
        function openPeek(id) { loadTaskData(id); }
        function closePeek() { document.getElementById('peekDrawer').classList.remove('drawer-open'); }

        // PIN Logic
        document.querySelectorAll('.pin-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                if(currentPin.length < 4) {
                    currentPin += e.currentTarget.getAttribute('data-val');
                    document.getElementById(`dot-${currentPin.length}`).classList.add('bg-white');
                    if(currentPin.length === 4) verifyPin();
                }
            });
        });
        document.querySelector('.pin-clear').addEventListener('click', () => { 
            currentPin = ''; 
            for(let i=1; i<=4; i++) document.getElementById(`dot-${i}`).classList.remove('bg-white');
        });

        async function verifyPin() {
            const { data } = await supabaseClient.from('floor_users').select('*').eq('pin', currentPin).single();
            if (data) {
                currentUser = data;
                document.getElementById('lockScreen').style.opacity = '0';
                setTimeout(() => document.getElementById('lockScreen').style.display = 'none', 500);
                document.getElementById('activeUserName').innerText = data.name;
                loadBoard();
            } else {
                document.getElementById('pinError').style.opacity = '1';
                setTimeout(() => { currentPin = ''; document.getElementById('pinError').style.opacity = '0'; }, 1000);
            }
        }

        function lockStation() { location.reload(); }

        // Load Roster
        async function initRoster() {
            const { data } = await supabaseClient.from('floor_users').select('name').eq('status', 'Active');
            if(data) {
                const dl = document.getElementById('rosterList');
                const sel = document.getElementById('pulseTL');
                data.forEach(u => {
                    dl.insertAdjacentHTML('beforeend', `<option value="${u.name}">`);
                    sel.insertAdjacentHTML('beforeend', `<option value="${u.name}">${u.name}</option>`);
                });
            }
        }
        initRoster();

        // Render Cards
        async function loadBoard() {
            const { data } = await supabaseClient.from('pulses').select('*').order('id', { ascending: false });
            ['Radar', 'Assigned To', 'In Progress', 'Completed'].forEach(s => document.getElementById(`col-${s}`).innerHTML = '');
            let counts = { 'Radar': 0, 'Assigned To': 0, 'In Progress': 0, 'Completed': 0 };
            
            data.forEach(item => {
                const lane = document.getElementById(`col-${item.status}`);
                if(lane) {
                    counts[item.status]++;
                    const prioClass = item.priority === 'Critical' ? 'badge-critical' : (item.priority === 'High' ? 'badge-high' : 'text-white/20 border-border');
                    const notes = item.notes ? '<i class="fa-solid fa-file-lines ml-2 opacity-20"></i>' : '';
                    const html = `
                        <div onclick="openPeek('${item.id}')" class="card p-4">
                            <div class="flex justify-between items-start mb-3">
                                <span class="text-[8px] font-black uppercase tracking-widest px-2 py-0.5 rounded border ${item.assigned_to !== 'None' ? 'border-white/20 text-white' : 'border-border text-white/20'}">${item.assigned_to}</span>
                                <span class="text-[8px] font-black uppercase tracking-widest px-2 py-0.5 rounded ${prioClass}">${item.priority}</span>
                            </div>
                            <p class="text-xs font-semibold leading-relaxed text-white/90">${item.title} ${notes}</p>
                            <p class="text-[9px] font-mono text-white/20 mt-3 uppercase tracking-tighter">${item.linked_entity}</p>
                        </div>`;
                    lane.insertAdjacentHTML('beforeend', html);
                }
            });
            ['Radar', 'Assigned To', 'In Progress'].forEach(s => document.getElementById(`count-${s}`).innerText = counts[s]);
        }

        // Side Drawer Data
        async function loadTaskData(id) {
            activePeekId = id;
            const { data } = await supabaseClient.from('pulses').select('*').eq('id', id).single();
            if(data) {
                document.getElementById('peekTitle').innerText = data.title;
                document.getElementById('peekEntity').innerText = `#${data.linked_entity}`;
                document.getElementById('peekNotes').value = data.notes || '';
                document.getElementById('peekDrawer').classList.add('drawer-open');
            }
        }

        async function updateStatus(s) {
            if(!activePeekId) return;
            await supabaseClient.from('pulses').update({ status: s }).eq('id', activePeekId);
            closePeek();
            loadBoard();
        }

        document.getElementById('commitNoteBtn').addEventListener('click', async () => {
            const n = document.getElementById('peekNotes').value;
            await supabaseClient.from('pulses').update({ notes: n }).eq('id', activePeekId);
            closePeek();
            loadBoard();
        });

        document.getElementById('archiveBtn').addEventListener('click', async () => {
            await supabaseClient.from('pulses').delete().eq('id', activePeekId);
            closePeek();
            loadBoard();
        });

        // Create Execution
        document.getElementById('executeBtn').addEventListener('click', async () => {
            const t = document.getElementById('pulseTitle').value;
            const e = document.getElementById('pulseTarget').value;
            const tl = document.getElementById('pulseTL').value;
            const p = document.getElementById('pulsePriority').value;
            if(!t) return;
            const status = tl !== 'None' ? 'Assigned To' : 'Radar';
            await supabaseClient.from('pulses').insert([{ title: t, linked_entity: e || 'N/A', assigned_to: tl, priority: p, status: status }]);
            closeCreateModal();
            loadBoard();
        });

        supabaseClient.channel('db-sync').on('postgres_changes', { event: '*', schema: 'public', table: 'pulses' }, () => loadBoard()).subscribe();
    </script>
</body>
</html>
