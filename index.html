<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SYNC | Command Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        apple: { canvas: '#F5F5F7', surface: '#FFFFFF', border: '#E5E5EA', primary: '#1D1D1F', secondary: '#86868B', blue: '#007AFF', blueHover: '#005bb5' }
                    },
                    fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] },
                    boxShadow: { 'apple-soft': '0 8px 30px rgba(0, 0, 0, 0.04)', 'apple-drawer': '-20px 0 40px rgba(0, 0, 0, 0.05)' }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { background-color: #F5F5F7; color: #1D1D1F; font-family: 'Inter', sans-serif; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        #slideDrawer { transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        .drawer-open { transform: translateX(0) !important; }
        select {
            -webkit-appearance: none; appearance: none;
            background-image: url("data:image/svg+xml;utf8,<svg fill='%2386868B' height='20' viewBox='0 0 24 24' width='20' xmlns='http://www.w3.org/2000/svg'><path d='M7 10l5 5 5-5z'/><path d='M0 0h24v24H0z' fill='none'/></svg>");
            background-repeat: no-repeat; background-position-x: calc(100% - 12px); background-position-y: 50%;
        }
    </style>
</head>
<body class="h-screen w-screen overflow-hidden flex antialiased selection:bg-apple-blue selection:text-white">

    <div id="lockScreen" class="fixed inset-0 z-[100] bg-[#F5F5F7]/90 backdrop-blur-md flex flex-col items-center justify-center transition-opacity duration-500">
        <div class="bg-white border border-apple-border p-10 rounded-[24px] w-80 shadow-apple-soft text-center">
            <h1 class="text-xl font-bold tracking-tight text-apple-primary mb-2">Command Access</h1>
            <p class="text-xs text-apple-secondary mb-8">Enter your PIN to unlock</p>
            
            <div class="flex justify-center gap-4 mb-8" id="pinDots">
                <div class="h-3 w-3 rounded-full border-2 border-apple-border transition-colors" id="dot-1"></div>
                <div class="h-3 w-3 rounded-full border-2 border-apple-border transition-colors" id="dot-2"></div>
                <div class="h-3 w-3 rounded-full border-2 border-apple-border transition-colors" id="dot-3"></div>
                <div class="h-3 w-3 rounded-full border-2 border-apple-border transition-colors" id="dot-4"></div>
            </div>
            
            <div class="grid grid-cols-3 gap-3" id="numpad">
                <button class="pin-btn h-14 bg-apple-canvas rounded-xl text-lg font-medium hover:bg-[#E8E8ED] active:scale-95 transition-all text-apple-primary" data-val="1">1</button>
                <button class="pin-btn h-14 bg-apple-canvas rounded-xl text-lg font-medium hover:bg-[#E8E8ED] active:scale-95 transition-all text-apple-primary" data-val="2">2</button>
                <button class="pin-btn h-14 bg-apple-canvas rounded-xl text-lg font-medium hover:bg-[#E8E8ED] active:scale-95 transition-all text-apple-primary" data-val="3">3</button>
                <button class="pin-btn h-14 bg-apple-canvas rounded-xl text-lg font-medium hover:bg-[#E8E8ED] active:scale-95 transition-all text-apple-primary" data-val="4">4</button>
                <button class="pin-btn h-14 bg-apple-canvas rounded-xl text-lg font-medium hover:bg-[#E8E8ED] active:scale-95 transition-all text-apple-primary" data-val="5">5</button>
                <button class="pin-btn h-14 bg-apple-canvas rounded-xl text-lg font-medium hover:bg-[#E8E8ED] active:scale-95 transition-all text-apple-primary" data-val="6">6</button>
                <button class="pin-btn h-14 bg-apple-canvas rounded-xl text-lg font-medium hover:bg-[#E8E8ED] active:scale-95 transition-all text-apple-primary" data-val="7">7</button>
                <button class="pin-btn h-14 bg-apple-canvas rounded-xl text-lg font-medium hover:bg-[#E8E8ED] active:scale-95 transition-all text-apple-primary" data-val="8">8</button>
                <button class="pin-btn h-14 bg-apple-canvas rounded-xl text-lg font-medium hover:bg-[#E8E8ED] active:scale-95 transition-all text-apple-primary" data-val="9">9</button>
                <button class="col-start-2 pin-btn h-14 bg-apple-canvas rounded-xl text-lg font-medium hover:bg-[#E8E8ED] active:scale-95 transition-all text-apple-primary" data-val="0">0</button>
                <button class="pin-clear h-14 text-[10px] font-bold text-apple-secondary hover:text-apple-primary uppercase tracking-widest active:scale-95 transition-all">CLR</button>
            </div>
            <p id="pinError" class="text-red-500 text-[10px] font-semibold tracking-wider uppercase text-center mt-6 h-4 opacity-0 transition-opacity">Access Denied</p>
        </div>
    </div>

    <aside class="w-[68px] h-full bg-apple-surface border-r border-apple-border flex flex-col items-center py-6 z-20 shrink-0">
        <div class="h-10 w-10 bg-apple-primary rounded-xl flex items-center justify-center text-white mb-8 shadow-sm">
            <i class="fa-solid fa-layer-group text-lg"></i>
        </div>
        <nav class="flex flex-col gap-6 w-full items-center">
            <button class="text-apple-blue relative group w-full flex justify-center" title="Dashboard">
                <i class="fa-solid fa-border-all text-xl"></i>
                <div class="absolute left-0 top-1/2 -translate-y-1/2 w-1 h-5 bg-apple-blue rounded-r-md"></div>
            </button>
        </nav>
        <div class="mt-auto">
            <button onclick="location.reload()" class="text-apple-secondary hover:text-red-500 transition-colors group w-full flex justify-center" title="Lock Station">
                <i class="fa-solid fa-power-off text-xl"></i>
            </button>
        </div>
    </aside>

    <div class="flex-1 flex flex-col h-full relative">
        <header class="h-16 border-b border-apple-border bg-white/70 backdrop-blur-xl z-10 flex items-center justify-between px-8 absolute top-0 left-0 right-0">
            <div class="flex-1"></div>
            <div class="w-[400px] h-9 bg-[#E8E8ED] rounded-full flex items-center px-4 border border-transparent focus-within:border-apple-blue focus-within:bg-white transition-all shadow-inner hidden md:flex">
                <i class="fa-solid fa-magnifying-glass text-apple-secondary text-sm"></i>
                <input type="text" id="cmdInput" placeholder="Search directives..." class="bg-transparent border-none outline-none text-sm ml-3 w-full placeholder-apple-secondary text-apple-primary">
                <span class="text-[10px] font-semibold text-apple-secondary tracking-widest bg-white shadow-sm border border-apple-border px-1.5 py-0.5 rounded ml-2">⌘K</span>
            </div>
            <div class="flex-1 flex justify-end items-center gap-4">
                <p id="activeUserName" class="text-xs font-semibold text-apple-secondary mr-2">LOCKED</p>
                <div class="h-8 w-8 rounded-full bg-gradient-to-tr from-gray-200 to-gray-300 shadow-sm border border-apple-border flex items-center justify-center text-apple-primary text-xs font-bold">
                    <i class="fa-solid fa-user text-white"></i>
                </div>
            </div>
        </header>
        <main class="flex-1 mt-16 p-6 md:p-10 overflow-y-auto scrollbar-hide bg-apple-canvas">
            <div class="max-w-7xl mx-auto">
                
                <div class="mb-8 flex justify-between items-end">
                    <div>
                        <h1 class="text-2xl font-bold tracking-tight text-apple-primary">Floor Operations</h1>
                        <p class="text-sm text-apple-secondary mt-1">Live task telemetry.</p>
                    </div>
                    <button onclick="openNewTaskModal()" class="bg-apple-blue hover:bg-apple-blueHover text-white px-5 py-2.5 rounded-full text-sm font-semibold tracking-wide transition-colors shadow-sm flex items-center gap-2 active:scale-95">
                        <i class="fa-solid fa-plus"></i> New Directive
                    </button>
                </div>

                <div class="grid grid-cols-2 lg:grid-cols-4 gap-4 md:gap-6 mb-10">
                    <div class="bg-apple-surface rounded-2xl p-5 md:p-6 shadow-apple-soft border border-apple-border">
                        <p class="text-[11px] uppercase tracking-wider font-semibold text-apple-secondary mb-2">Total Active</p>
                        <span id="kpi-total" class="text-3xl font-bold tracking-tight text-apple-primary">0</span>
                    </div>
                    <div class="bg-apple-surface rounded-2xl p-5 md:p-6 shadow-apple-soft border border-apple-border">
                        <p class="text-[11px] uppercase tracking-wider font-semibold text-apple-secondary mb-2">Radar</p>
                        <span id="kpi-radar" class="text-3xl font-bold tracking-tight text-apple-primary">0</span>
                    </div>
                    <div class="bg-apple-surface rounded-2xl p-5 md:p-6 shadow-apple-soft border border-apple-border">
                        <p class="text-[11px] uppercase tracking-wider font-semibold text-apple-secondary mb-2">In Progress</p>
                        <span id="kpi-progress" class="text-3xl font-bold tracking-tight text-apple-primary">0</span>
                    </div>
                    <div class="bg-apple-surface rounded-2xl p-5 md:p-6 shadow-apple-soft border border-apple-border opacity-60">
                        <p class="text-[11px] uppercase tracking-wider font-semibold text-apple-secondary mb-2">Completed</p>
                        <span id="kpi-completed" class="text-3xl font-bold tracking-tight text-apple-primary">0</span>
                    </div>
                </div>

                <div class="bg-apple-surface rounded-2xl shadow-apple-soft border border-apple-border overflow-hidden">
                    <div class="overflow-x-auto">
                        <table class="w-full text-left border-collapse min-w-[800px]">
                            <thead>
                                <tr class="bg-[#FBFBFD] border-b border-apple-border">
                                    <th class="py-4 px-6 text-[10px] uppercase tracking-wider font-semibold text-apple-secondary">Directive</th>
                                    <th class="py-4 px-6 text-[10px] uppercase tracking-wider font-semibold text-apple-secondary">Target</th>
                                    <th class="py-4 px-6 text-[10px] uppercase tracking-wider font-semibold text-apple-secondary">Assignee</th>
                                    <th class="py-4 px-6 text-[10px] uppercase tracking-wider font-semibold text-apple-secondary">Status</th>
                                    <th class="py-4 px-6 text-[10px] uppercase tracking-wider font-semibold text-apple-secondary text-right">Details</th>
                                </tr>
                            </thead>
                            <tbody id="taskTableBody">
                                </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>

        <div id="slideDrawer" class="absolute top-16 right-0 bottom-0 w-full sm:w-[420px] bg-white/90 backdrop-blur-2xl shadow-apple-drawer border-l border-apple-border z-30 transform translate-x-full flex flex-col">
            <div class="px-8 py-6 border-b border-apple-border flex justify-between items-start bg-white/50">
                <div>
                    <p class="text-[10px] font-bold text-apple-secondary uppercase tracking-widest mb-1">Editing Directive</p>
                    <h2 id="drawerTitle" class="text-lg font-bold text-apple-primary tracking-tight leading-snug">Task Title</h2>
                </div>
                <button onclick="closeDrawer()" class="h-8 w-8 rounded-full bg-apple-canvas text-apple-secondary hover:text-apple-primary hover:bg-[#E8E8ED] transition-colors flex items-center justify-center shrink-0">
                    <i class="fa-solid fa-xmark"></i>
                </button>
            </div>
            <div class="flex-1 overflow-y-auto p-8 flex flex-col gap-6">
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="text-[10px] uppercase tracking-wider font-semibold text-apple-secondary mb-2 block">Status</label>
                        <select id="drawerStatus" class="w-full bg-apple-canvas border border-apple-border h-10 px-3 text-sm rounded-lg text-apple-primary font-medium outline-none focus:border-apple-blue cursor-pointer">
                            <option value="Radar">Radar</option>
                            <option value="Assigned To">Assigned To</option>
                            <option value="In Progress">In Progress</option>
                            <option value="Completed">Completed</option>
                        </select>
                    </div>
                    <div>
                        <label class="text-[10px] uppercase tracking-wider font-semibold text-apple-secondary mb-2 block">Priority</label>
                        <select id="drawerPriority" class="w-full bg-apple-canvas border border-apple-border h-10 px-3 text-sm rounded-lg text-apple-primary font-medium outline-none focus:border-apple-blue cursor-pointer">
                            <option value="Standard">Standard</option>
                            <option value="High">High</option>
                            <option value="Critical">Critical</option>
                        </select>
                    </div>
                </div>
                <div>
                    <label class="text-[10px] uppercase tracking-wider font-semibold text-apple-secondary mb-2 block">Assigned Leader</label>
                    <select id="drawerAssignee" class="w-full bg-apple-canvas border border-apple-border h-10 px-3 text-sm rounded-lg text-apple-primary font-medium outline-none focus:border-apple-blue cursor-pointer">
                        <option value="None">Unassigned</option>
                    </select>
                </div>
                <div class="flex-1 flex flex-col">
                    <label class="text-[10px] uppercase tracking-wider font-semibold text-apple-secondary mb-2 block">Operational Notes</label>
                    <textarea id="drawerNotes" class="flex-1 w-full bg-apple-canvas border border-apple-border rounded-lg p-4 text-sm text-apple-primary outline-none focus:border-apple-blue resize-none min-h-[120px]"></textarea>
                </div>
            </div>
            <div class="p-6 border-t border-apple-border bg-white/80 backdrop-blur-md flex gap-3">
                <button id="archiveBtn" class="px-5 text-red-500 bg-red-50 hover:bg-red-100 rounded-xl text-sm font-semibold transition-colors flex items-center justify-center">
                    <i class="fa-solid fa-trash-can"></i>
                </button>
                <button onclick="saveAndClose()" id="saveDrawerBtn" class="flex-1 bg-apple-blue hover:bg-apple-blueHover text-white h-11 rounded-xl text-sm font-semibold tracking-wide transition-colors shadow-sm active:scale-[0.98]">
                    Save Changes
                </button>
            </div>
        </div>
    </div>

    <div id="newTaskModal" class="fixed inset-0 z-[110] bg-apple-primary/40 backdrop-blur-sm hidden items-center justify-center p-4">
        <div class="bg-white border border-apple-border w-full max-w-md p-8 rounded-2xl shadow-2xl">
            <h3 class="text-lg font-bold tracking-tight text-apple-primary mb-6">Create Directive</h3>
            <div class="space-y-4 mb-8">
                <input type="text" id="newTitle" placeholder="Task Title" class="w-full bg-apple-canvas border border-apple-border h-11 px-4 text-sm rounded-lg outline-none focus:border-apple-blue text-apple-primary font-medium">
                <input type="text" id="newTarget" placeholder="Target Entity..." class="w-full bg-apple-canvas border border-apple-border h-11 px-4 text-sm rounded-lg outline-none focus:border-apple-blue text-apple-primary font-medium">
            </div>
            <div class="flex gap-3">
                <button onclick="closeNewTaskModal()" class="flex-1 h-11 text-sm font-semibold bg-apple-canvas text-apple-secondary rounded-xl hover:bg-[#E8E8ED] transition-colors">Cancel</button>
                <button id="createTaskBtn" class="flex-1 h-11 text-sm font-semibold bg-apple-blue text-white rounded-xl hover:bg-apple-blueHover shadow-sm transition-colors">Create Task</button>
            </div>
        </div>
    </div>

    <div id="toastAlert" class="fixed bottom-6 left-1/2 -translate-x-1/2 transform translate-y-[150%] transition-transform duration-300 ease-out bg-apple-primary px-6 py-3 rounded-full shadow-lg z-[120] flex items-center gap-3">
        <i class="fa-solid fa-check-circle text-green-400 text-sm"></i>
        <p id="toastMessage" class="text-sm font-medium text-white">Action Confirmed</p>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const supabaseUrl = 'https://pmhmuzctbstrhtmwxlay.supabase.co';
        const supabaseKey = 'sb_publishable_8dtRYPrztDbEt3bZhU3ibQ_5PAt_FsP';
        const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

        let currentUser = null;
        let currentPin = '';
        let activeDrawerId = null;
        let globalTasks = [];

        // --- PIN SECURITY ---
        document.querySelectorAll('.pin-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                if(currentPin.length < 4) {
                    currentPin += e.currentTarget.getAttribute('data-val');
                    document.getElementById(`dot-${currentPin.length}`).classList.replace('border-apple-border', 'bg-apple-primary');
                    if(currentPin.length === 4) verifyPin();
                }
            });
        });

        document.querySelector('.pin-clear').addEventListener('click', () => { 
            currentPin = ''; 
            for(let i=1; i<=4; i++) {
                const dot = document.getElementById(`dot-${i}`);
                dot.classList.remove('bg-apple-primary');
                dot.classList.add('border-apple-border');
            }
        });

        async function verifyPin() {
            const { data } = await supabaseClient.from('floor_users').select('*').eq('pin', currentPin).single();
            if (data) {
                currentUser = data;
                document.getElementById('lockScreen').style.opacity = '0';
                setTimeout(() => document.getElementById('lockScreen').style.display = 'none', 500);
                document.getElementById('activeUserName').innerText = data.name;
                initRoster();
                loadTable();
            } else {
                document.getElementById('pinError').style.opacity = '1';
                setTimeout(() => { 
                    document.querySelector('.pin-clear').click();
                    document.getElementById('pinError').style.opacity = '0'; 
                }, 1000);
            }
        }

        // --- INIT ROSTER ---
        async function initRoster() {
            const { data } = await supabaseClient.from('floor_users').select('name').eq('status', 'Active');
            if(data) {
                const assignSel = document.getElementById('drawerAssignee');
                data.forEach(user => {
                    assignSel.insertAdjacentHTML('beforeend', `<option value="${user.name}">${user.name}</option>`);
                });
            }
        }

        // --- LOAD DATA ---
        supabaseClient.channel('db-sync').on('postgres_changes', { event: '*', schema: 'public', table: 'pulses' }, () => {
            if(currentUser) loadTable();
        }).subscribe();

        async function loadTable() {
            const { data } = await supabaseClient.from('pulses').select('*').order('id', { ascending: false });
            if(!data) return;
            globalTasks = data;

            const tbody = document.getElementById('taskTableBody');
            tbody.innerHTML = '';
            
            let counts = { total: 0, radar: 0, progress: 0, completed: 0 };

            data.forEach(item => {
                counts.total++;
                if(item.status === 'Radar') counts.radar++;
                if(item.status === 'In Progress' || item.status === 'Assigned To') counts.progress++;
                if(item.status === 'Completed') counts.completed++;

                // Badge Logic
                let statusBadge = '';
                if(item.status === 'Completed') statusBadge = `<span class="inline-flex px-2 py-0.5 rounded text-[10px] font-bold tracking-widest bg-[#F2F2F7] text-[#8E8E93] uppercase">Done</span>`;
                else if(item.status === 'Radar') statusBadge = `<span class="inline-flex px-2 py-0.5 rounded text-[10px] font-bold tracking-widest bg-gray-100 text-gray-600 uppercase">Radar</span>`;
                else statusBadge = `<span class="inline-flex px-2 py-0.5 rounded text-[10px] font-bold tracking-widest bg-[#FEF0E3] text-[#E37400] uppercase">${item.status}</span>`;

                let prioColor = item.priority === 'Critical' ? 'text-red-500' : (item.priority === 'High' ? 'text-orange-500' : 'text-apple-secondary');
                let hasNotes = item.notes && item.notes.trim() !== '' ? `<i class="fa-solid fa-note-sticky ml-2 text-apple-secondary/50 text-[10px]"></i>` : '';

                const rowHTML = `
                    <tr class="border-b border-apple-border hover:bg-apple-canvas transition-colors cursor-pointer group" onclick="openDrawer('${item.id}')">
                        <td class="py-4 px-6">
                            <p class="text-sm font-semibold text-apple-primary">${item.title} ${hasNotes}</p>
                        </td>
                        <td class="py-4 px-6 text-sm text-apple-secondary font-mono text-[11px]">${item.linked_entity}</td>
                        <td class="py-4 px-6 text-sm font-medium text-apple-primary">${item.assigned_to}</td>
                        <td class="py-4 px-6">${statusBadge}</td>
                        <td class="py-4 px-6 text-right text-apple-secondary group-hover:text-apple-blue transition-colors">
                            <i class="fa-solid fa-chevron-right text-xs"></i>
                        </td>
                    </tr>
                `;
                tbody.insertAdjacentHTML('beforeend', rowHTML);
            });

            document.getElementById('kpi-total').innerText = counts.total;
            document.getElementById('kpi-radar').innerText = counts.radar;
            document.getElementById('kpi-progress').innerText = counts.progress;
            document.getElementById('kpi-completed').innerText = counts.completed;
        }

        // --- DRAWER LOGIC ---
        function openDrawer(id) {
            activeDrawerId = id;
            const task = globalTasks.find(t => t.id == id);
            if(task) {
                document.getElementById('drawerTitle').innerText = task.title;
                document.getElementById('drawerStatus').value = task.status;
                document.getElementById('drawerPriority').value = task.priority;
                document.getElementById('drawerAssignee').value = task.assigned_to;
                document.getElementById('drawerNotes').value = task.notes || '';
                document.getElementById('slideDrawer').classList.add('drawer-open');
            }
        }

        function closeDrawer() {
            activeDrawerId = null;
            document.getElementById('slideDrawer').classList.remove('drawer-open');
        }

        async function saveAndClose() {
            if(!activeDrawerId) return;
            const btn = document.getElementById('saveDrawerBtn');
            btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i>';
            
            const updates = {
                status: document.getElementById('drawerStatus').value,
                priority: document.getElementById('drawerPriority').value,
                assigned_to: document.getElementById('drawerAssignee').value,
                notes: document.getElementById('drawerNotes').value
            };

            await supabaseClient.from('pulses').update(updates).eq('id', activeDrawerId);
            
            btn.innerHTML = 'Save Changes';
            showToast('Changes applied successfully');
            closeDrawer();
            loadTable();
        }

        document.getElementById('archiveBtn').addEventListener('click', async () => {
            if(!activeDrawerId) return;
            await supabaseClient.from('pulses').delete().eq('id', activeDrawerId);
            showToast('Task removed from board');
            closeDrawer();
            loadTable();
        });

        // --- NEW TASK MODAL ---
        function openNewTaskModal() { document.getElementById('newTaskModal').style.display = 'flex'; }
        function closeNewTaskModal() { document.getElementById('newTaskModal').style.display = 'none'; }

        document.getElementById('createTaskBtn').addEventListener('click', async () => {
            const title = document.getElementById('newTitle').value;
            const target = document.getElementById('newTarget').value;
            if(!title) return;

            const btn = document.getElementById('createTaskBtn');
            btn.innerText = "Creating...";

            await supabaseClient.from('pulses').insert([{ 
                title: title, linked_entity: target || 'N/A', 
                assigned_to: 'None', priority: 'Standard', status: 'Radar' 
            }]);
            
            document.getElementById('newTitle').value = '';
            document.getElementById('newTarget').value = '';
            btn.innerText = "Create Task";
            
            closeNewTaskModal();
            showToast('New directive initialized');
            loadTable();
        });

        // --- UTILS ---
        function showToast(msg) {
            const toast = document.getElementById('toastAlert');
            document.getElementById('toastMessage').innerText = msg;
            toast.classList.remove('translate-y-[150%]');
            setTimeout(() => toast.classList.add('translate-y-[150%]'), 3000);
        }

        // Cmd+K Search Focus
        document.addEventListener('keydown', (e) => {
            if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
                e.preventDefault();
                const searchInput = document.getElementById('cmdInput');
                if(searchInput) searchInput.focus();
            }
        });
    </script>
</body>
</html>
