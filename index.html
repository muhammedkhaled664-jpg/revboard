<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SYNC | Tactical Operations</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: { void: '#000000', chassis: '#050505', glass: 'rgba(255, 255, 255, 0.03)' },
                    fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap');
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* Tactical Mesh & Core Glow (The Premium Background) */
        .tactical-grid {
            background-size: 40px 40px;
            background-image: 
                linear-gradient(to right, rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            position: fixed; inset: 0; z-index: 0; pointer-events: none;
        }
        .core-glow {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 100vw; height: 100vh;
            background: radial-gradient(circle, rgba(255,255,255,0.04) 0%, transparent 60%);
            z-index: 0; pointer-events: none;
        }
        
        /* Elevate main content above the grid */
        header, main, .elevated-ui { position: relative; z-index: 10; }

        /* Glass-morphism & Premium Textures */
        .glass-panel { background: rgba(10, 10, 10, 0.7); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .glass-card { background: rgba(20, 20, 20, 0.5); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.06); transition: all 0.2s ease; }
        .glass-card:hover { border: 1px solid rgba(255, 255, 255, 0.25); box-shadow: 0 8px 30px rgba(0,0,0,0.6); transform: translateY(-2px); }
        
        /* Animations */
        .dragging { opacity: 0.4; transform: scale(0.95) rotate(2deg); }
        .column-dropzone { min-height: 200px; transition: background-color 0.2s ease; border-radius: 0.75rem; }
        .drag-over { background-color: rgba(255, 255, 255, 0.04); border: 1px dashed rgba(255,255,255,0.2); }
        .drawer-open { transform: translateX(0%); }
        
        /* The Threat Pulse */
        @keyframes threatPulse { 0% { color: #ef4444; text-shadow: 0 0 10px rgba(239,68,68,0.5); } 50% { color: #f87171; text-shadow: 0 0 20px rgba(239,68,68,0.8); } 100% { color: #ef4444; text-shadow: 0 0 10px rgba(239,68,68,0.5); } }
        .threat-active { animation: threatPulse 2s infinite; }
    </style>
</head>
<body class="bg-void text-gray-300 h-screen w-screen overflow-hidden font-sans antialiased selection:bg-white selection:text-black relative flex flex-col">

    <div class="tactical-grid"></div>
    <div class="core-glow"></div>

    <audio id="audio-sonar" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3"></audio>
    <audio id="audio-click" src="https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3"></audio>
    <audio id="audio-siren" src="https://assets.mixkit.co/active_storage/sfx/995/995-preview.mp3" loop></audio>

    <div id="lockScreen" class="absolute inset-0 z-[100] bg-void flex flex-col items-center justify-center transition-all duration-700 ease-in-out">
        <div class="tactical-grid opacity-50"></div>
        <div class="text-center mb-8 transform transition-transform duration-500 hover:scale-105 elevated-ui">
            <h1 class="text-5xl font-black tracking-[0.2em] text-white uppercase shadow-white/10 drop-shadow-2xl">SYNC</h1>
            <p class="text-[10px] font-bold text-white/40 uppercase tracking-[0.4em] mt-3">Awaiting Authorization</p>
        </div>

        <div class="glass-panel p-8 rounded-3xl w-80 shadow-[0_0_80px_rgba(255,255,255,0.03)] elevated-ui">
            <div class="flex justify-center gap-5 mb-8" id="pinDots">
                <div class="h-2 w-2 rounded-full bg-black border border-white/30 transition-all duration-300" id="dot-1"></div>
                <div class="h-2 w-2 rounded-full bg-black border border-white/30 transition-all duration-300" id="dot-2"></div>
                <div class="h-2 w-2 rounded-full bg-black border border-white/30 transition-all duration-300" id="dot-3"></div>
                <div class="h-2 w-2 rounded-full bg-black border border-white/30 transition-all duration-300" id="dot-4"></div>
            </div>
            
            <div class="grid grid-cols-3 gap-3" id="numpad">
                <button class="pin-btn h-14 bg-black/50 border border-white/10 rounded-xl text-xl font-light text-white hover:bg-white/10 transition-all active:scale-95" data-val="1">1</button>
                <button class="pin-btn h-14 bg-black/50 border border-white/10 rounded-xl text-xl font-light text-white hover:bg-white/10 transition-all active:scale-95" data-val="2">2</button>
                <button class="pin-btn h-14 bg-black/50 border border-white/10 rounded-xl text-xl font-light text-white hover:bg-white/10 transition-all active:scale-95" data-val="3">3</button>
                <button class="pin-btn h-14 bg-black/50 border border-white/10 rounded-xl text-xl font-light text-white hover:bg-white/10 transition-all active:scale-95" data-val="4">4</button>
                <button class="pin-btn h-14 bg-black/50 border border-white/10 rounded-xl text-xl font-light text-white hover:bg-white/10 transition-all active:scale-95" data-val="5">5</button>
                <button class="pin-btn h-14 bg-black/50 border border-white/10 rounded-xl text-xl font-light text-white hover:bg-white/10 transition-all active:scale-95" data-val="6">6</button>
                <button class="pin-btn h-14 bg-black/50 border border-white/10 rounded-xl text-xl font-light text-white hover:bg-white/10 transition-all active:scale-95" data-val="7">7</button>
                <button class="pin-btn h-14 bg-black/50 border border-white/10 rounded-xl text-xl font-light text-white hover:bg-white/10 transition-all active:scale-95" data-val="8">8</button>
                <button class="pin-btn h-14 bg-black/50 border border-white/10 rounded-xl text-xl font-light text-white hover:bg-white/10 transition-all active:scale-95" data-val="9">9</button>
                <button class="col-start-2 pin-btn h-14 bg-black/50 border border-white/10 rounded-xl text-xl font-light text-white hover:bg-white/10 transition-all active:scale-95" data-val="0">0</button>
                <button class="pin-clear h-14 bg-transparent text-[10px] font-bold text-white/40 hover:text-white uppercase tracking-widest transition-all active:scale-95">CLR</button>
            </div>
            <p id="pinError" class="text-red-500 text-[9px] font-bold tracking-widest uppercase text-center mt-6 h-4 opacity-0 transition-opacity">Access Denied</p>
        </div>
    </div>

    <header class="h-16 border-b border-white/10 flex items-center justify-between px-6 shrink-0 z-10 w-full bg-void/50 backdrop-blur-md">
        <div class="flex items-center gap-4 w-1/3">
            <h1 id="syncLogo" class="text-xl font-black tracking-[0.2em] text-white uppercase transition-colors duration-300">SYNC</h1>
        </div>
        <div class="w-1/3 flex justify-end items-center gap-3">
            <div class="text-right hidden sm:block">
                <p id="activeUserName" class="text-xs font-bold text-white tracking-widest uppercase">LOCKED</p>
                <p id="activeUserRole" class="text-[9px] text-white/40 uppercase tracking-widest">Awaiting Identity</p>
            </div>
            <div class="h-8 w-8 rounded-full border border-white/20 flex items-center justify-center text-xs text-white/70 bg-white/5 shadow-inner">
                <i class="fa-solid fa-fingerprint"></i>
            </div>
        </div>
    </header>

    <main class="flex-1 overflow-x-auto overflow-y-auto p-4 sm:p-8 pb-32">
        <div class="flex flex-col md:flex-row gap-6 h-full items-start min-w-max md:min-w-0 w-full">
            
            <div class="w-full md:w-80 shrink-0 flex flex-col max-h-full">
                <div class="flex justify-between items-center mb-4 px-1 border-b border-white/10 pb-3">
                    <h3 class="font-bold text-[10px] uppercase tracking-widest text-white/60">Radar</h3>
                    <span class="text-xs font-mono text-white/50 bg-white/5 border border-white/10 px-2 py-0.5 rounded" id="count-Radar">0</span>
                </div>
                <div class="flex-1 overflow-y-auto space-y-3 scrollbar-hide pb-10 column-dropzone" id="col-Radar" ondrop="drop(event, 'Radar')" ondragover="allowDrop(event)" ondragleave="dragLeave(event)"></div>
            </div>

            <div class="w-full md:w-80 shrink-0 flex flex-col max-h-full">
                <div class="flex justify-between items-center mb-4 px-1 border-b border-white/10 pb-3">
                    <h3 class="font-bold text-[10px] uppercase tracking-widest text-white">Assigned To</h3>
                    <span class="text-xs font-mono text-white bg-white/10 border border-white/20 px-2 py-0.5 rounded" id="count-Assigned To">0</span>
                </div>
                <div class="flex-1 overflow-y-auto space-y-3 scrollbar-hide pb-10 column-dropzone" id="col-Assigned To" ondrop="drop(event, 'Assigned To')" ondragover="allowDrop(event)" ondragleave="dragLeave(event)"></div>
            </div>

            <div class="w-full md:w-80 shrink-0 flex flex-col max-h-full">
                <div class="flex justify-between items-center mb-4 px-1 border-b border-white/10 pb-3">
                    <h3 class="font-bold text-[10px] uppercase tracking-widest text-white/60 flex items-center gap-2"><i class="fa-solid fa-circle-notch animate-spin text-[9px]"></i> In Progress</h3>
                    <span class="text-xs font-mono text-white/50 bg-white/5 border border-white/10 px-2 py-0.5 rounded" id="count-In Progress">0</span>
                </div>
                <div class="flex-1 overflow-y-auto space-y-3 scrollbar-hide pb-10 column-dropzone" id="col-In Progress" ondrop="drop(event, 'In Progress')" ondragover="allowDrop(event)" ondragleave="dragLeave(event)"></div>
            </div>

            <div class="w-full md:w-80 shrink-0 flex flex-col max-h-full">
                <div class="flex justify-between items-center mb-4 px-1 border-b border-white/10 pb-3">
                    <h3 class="font-bold text-[10px] uppercase tracking-widest text-white/40">Completed</h3>
                </div>
                <div class="flex-1 overflow-y-auto space-y-3 scrollbar-hide pb-10 column-dropzone opacity-60" id="col-Completed" ondrop="drop(event, 'Completed')" ondragover="allowDrop(event)" ondragleave="dragLeave(event)"></div>
            </div>

        </div>
    </main>
    <div id="shiftBlackout" class="fixed inset-0 z-[200] bg-black flex flex-col items-center justify-center opacity-0 pointer-events-none transition-opacity duration-1000">
        <h2 class="text-white text-2xl font-black tracking-[0.3em] uppercase animate-pulse">Syncing New Shift</h2>
        <p class="text-white/40 text-[10px] tracking-widest mt-4">Purging Completed Directives...</p>
    </div>

    <div id="toastAlert" class="fixed top-20 right-6 transform translate-x-[150%] transition-transform duration-300 ease-out glass-panel px-6 py-4 rounded-xl shadow-2xl z-[90] flex items-center gap-4 elevated-ui">
        <i class="fa-solid fa-satellite-dish text-white text-lg"></i>
        <div>
            <p class="text-[9px] font-black uppercase tracking-widest text-white/50" id="toastHeader">System</p>
            <p id="toastMessage" class="text-sm font-bold tracking-tight text-white">Action Confirmed</p>
        </div>
    </div>

    <div id="peekDrawer" class="fixed top-0 right-0 h-full w-full sm:w-[400px] glass-panel border-l border-white/10 z-[80] transform translate-x-full transition-transform duration-300 ease-out flex flex-col shadow-[-20px_0_50px_rgba(0,0,0,0.8)] elevated-ui">
        <div class="p-6 border-b border-white/10 flex justify-between items-start bg-black/40">
            <div>
                <p id="peekEntity" class="text-[10px] text-white/50 font-mono mb-1">#Entity</p>
                <h2 id="peekTitle" class="text-xl font-bold text-white leading-tight">Directive Title</h2>
            </div>
            <button onclick="closePeek()" class="text-white/40 hover:text-white transition-colors h-8 w-8 bg-white/5 rounded-full flex items-center justify-center border border-white/10 hover:bg-white/10"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <div class="flex-1 p-6 flex flex-col gap-4">
            <label class="text-[9px] font-bold tracking-widest text-white/60 uppercase"><i class="fa-regular fa-comment-dots mr-2"></i>Operational Notes</label>
            <textarea id="peekNotes" class="w-full flex-1 bg-black/60 border border-white/10 rounded-xl p-4 text-sm text-white outline-none focus:border-white/40 resize-none font-mono shadow-inner" placeholder="Enter tactical notes here..."></textarea>
            <button id="commitNoteBtn" class="bg-white/10 hover:bg-white/20 text-white border border-white/20 py-3 rounded-xl text-xs font-bold tracking-widest uppercase transition-all shadow-lg active:scale-95">Commit Note</button>
        </div>
        <div class="p-6 border-t border-white/10 bg-black/40">
            <button id="archiveBtn" class="w-full text-red-500/80 hover:text-red-500 hover:bg-red-500/10 py-3 rounded-xl text-xs font-bold tracking-widest uppercase transition-all border border-red-500/10 hover:border-red-500/30 active:scale-95"><i class="fa-solid fa-trash-can mr-2"></i> Archive Directive</button>
        </div>
    </div>

    <div class="fixed bottom-6 left-1/2 transform -translate-x-1/2 z-[70] w-[95%] sm:w-auto elevated-ui">
        <div class="glass-panel rounded-full p-2 flex flex-col sm:flex-row items-center gap-2 shadow-[0_20px_50px_rgba(0,0,0,0.8)] border border-white/20">
            
            <button id="muteBtn" class="h-10 w-10 shrink-0 rounded-full bg-white/5 hover:bg-white/10 flex items-center justify-center text-white/60 hover:text-white transition-colors border border-white/10">
                <i class="fa-solid fa-volume-high" id="muteIcon"></i>
            </button>

            <div class="flex items-center bg-black/50 rounded-full px-4 h-10 border border-white/10 flex-1 min-w-[200px] shadow-inner">
                <i class="fa-solid fa-bolt text-white/40 text-xs mr-3"></i>
                <input type="text" id="pulseTitle" placeholder="Initiate directive..." class="bg-transparent border-none text-white text-sm outline-none placeholder-white/40 w-full font-medium">
            </div>

            <div class="flex items-center bg-black/50 rounded-full px-4 h-10 border border-white/10 w-[140px] shadow-inner">
                <i class="fa-solid fa-crosshairs text-white/40 text-xs mr-3"></i>
                <input type="text" id="pulseTarget" list="rosterList" placeholder="Target..." class="bg-transparent border-none text-white text-sm outline-none placeholder-white/40 w-full font-medium">
                <datalist id="rosterList"></datalist>
            </div>
            
            <select id="pulseTL" class="h-10 bg-black/50 border border-white/10 rounded-full px-4 text-xs outline-none text-white hover:border-white/40 appearance-none font-semibold cursor-pointer w-[140px] shadow-inner">
                <option value="None">No TL</option>
            </select>

            <select id="pulsePriority" class="h-10 bg-black/50 border border-white/10 rounded-full px-4 text-xs outline-none text-white hover:border-white/40 appearance-none font-semibold cursor-pointer w-[110px] shadow-inner">
                <option value="Standard">Standard</option>
                <option value="High" class="text-yellow-400">High</option>
                <option value="Critical" class="text-red-500">Critical</option>
            </select>

            <button id="executeBtn" class="h-10 px-6 rounded-full bg-white text-black text-xs font-black tracking-widest uppercase hover:bg-gray-200 transition-all shadow-[0_0_20px_rgba(255,255,255,0.3)] active:scale-95">
                SYNC
            </button>

            <button onclick="lockStation()" class="h-10 w-10 shrink-0 rounded-full bg-red-500/10 hover:bg-red-500/20 flex items-center justify-center text-red-500 transition-colors border border-red-500/30 ml-1">
                <i class="fa-solid fa-lock"></i>
            </button>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // --- 1. CORE ENGINE SETUP ---
        const supabaseUrl = 'https://pmhmuzctbstrhtmwxlay.supabase.co';
        const supabaseKey = 'sb_publishable_8dtRYPrztDbEt3bZhU3ibQ_5PAt_FsP';
        const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

        let currentUser = null;
        let currentPin = '';
        let activePeekId = null;
        let isMuted = false;
        let sirenPlaying = false;
        let rosterNames = [];

        const audioSonar = document.getElementById('audio-sonar');
        const audioClick = document.getElementById('audio-click');
        const audioSiren = document.getElementById('audio-siren');

        function playSound(type) {
            if (isMuted) return;
            if (type === 'sonar') { audioSonar.currentTime = 0; audioSonar.play().catch(()=>{}); }
            if (type === 'click') { audioClick.currentTime = 0; audioClick.play().catch(()=>{}); }
        }

        // --- 2. AUDIO & MUTE TOGGLE ---
        document.getElementById('muteBtn').addEventListener('click', () => {
            isMuted = !isMuted;
            const icon = document.getElementById('muteIcon');
            if(isMuted) {
                icon.classList.replace('fa-volume-high', 'fa-volume-xmark');
                audioSiren.pause();
            } else {
                icon.classList.replace('fa-volume-xmark', 'fa-volume-high');
                if(sirenPlaying) audioSiren.play().catch(()=>{});
            }
        });

        // --- 3. FETCH ROSTER & SMART SELECTOR ---
        async function loadRoster() {
            const { data } = await supabaseClient.from('floor_users').select('name').eq('status', 'Active');
            if (!data) return;
            
            const dropdown = document.getElementById('pulseTL');
            const datalist = document.getElementById('rosterList');
            rosterNames = data.map(u => u.name);
            
            data.forEach(user => {
                dropdown.insertAdjacentHTML('beforeend', `<option value="${user.name}">Assign: ${user.name}</option>`);
                datalist.insertAdjacentHTML('beforeend', `<option value="${user.name}">`);
            });
        }
        loadRoster();

        document.getElementById('pulseTarget').addEventListener('input', (e) => {
            const val = e.target.value;
            if (rosterNames.includes(val)) {
                document.getElementById('pulseTL').value = val;
            }
        });

        // --- 4. PIN PAD LOGIC ---
        document.querySelectorAll('.pin-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                if(currentPin.length < 4) {
                    currentPin += e.target.getAttribute('data-val');
                    updatePinDots();
                    if(currentPin.length === 4) verifyPin();
                }
            });
        });

        document.querySelector('.pin-clear').addEventListener('click', () => {
            currentPin = '';
            updatePinDots();
        });

        function updatePinDots() {
            for(let i=1; i<=4; i++) {
                const dot = document.getElementById(`dot-${i}`);
                if(i <= currentPin.length) dot.classList.replace('bg-black', 'bg-white');
                else dot.classList.replace('bg-white', 'bg-black');
            }
        }

        async function verifyPin() {
            const { data, error } = await supabaseClient.from('floor_users').select('*').eq('pin', currentPin).single();
            if (data) {
                currentUser = data;
                document.getElementById('lockScreen').classList.add('opacity-0', 'pointer-events-none');
                document.getElementById('activeUserName').innerText = data.name;
                document.getElementById('activeUserRole').innerText = data.role;
                showToast('SYSTEM', `Welcome back, ${data.name}`);
                loadBoard();
            } else {
                document.getElementById('pinError').style.opacity = '1';
                setTimeout(() => { currentPin = ''; updatePinDots(); document.getElementById('pinError').style.opacity = '0'; }, 1000);
            }
        }

        function lockStation() {
            currentUser = null;
            currentPin = '';
            updatePinDots();
            document.getElementById('lockScreen').classList.remove('opacity-0', 'pointer-events-none');
        }

        // --- 5. REAL-TIME BOARD SYNC ---
        supabaseClient.channel('custom-all-channel')
            .on('postgres_changes', { event: '*', schema: 'public', table: 'pulses' }, payload => {
                if (currentUser) {
                    playSound('sonar');
                    loadBoard();
                }
            }).subscribe();

        // --- 6. RENDER KANBAN ---
        async function loadBoard() {
            const { data } = await supabaseClient.from('pulses').select('*').order('id', { ascending: false });
            if (!data) return;

            document.getElementById('col-Radar').innerHTML = '';
            document.getElementById('col-Assigned To').innerHTML = '';
            document.getElementById('col-In Progress').innerHTML = '';
            document.getElementById('col-Completed').innerHTML = '';

            let threats = 0;
            let counts = { 'Radar': 0, 'Assigned To': 0, 'In Progress': 0 };

            data.forEach(item => {
                const colElement = document.getElementById(`col-${item.status}`);
                if(colElement) {
                    if (item.priority === 'Critical' && item.status !== 'Completed') threats++;
                    if (counts[item.status] !== undefined) counts[item.status]++;

                    const borderClass = item.priority === 'Critical' ? 'border-red-500 shadow-[0_0_15px_rgba(239,68,68,0.3)]' : 'border-white/10';
                    const tagClass = item.assigned_to !== 'None' ? `bg-white/10 text-white border border-white/20` : `border border-white/10 text-white/40`;
                    const hasNotes = item.notes && item.notes.trim() !== '' ? `<i class="fa-regular fa-comment-dots text-white/40 text-[10px] ml-2"></i>` : '';
                    
                    const cardHTML = `
                        <div id="card-${item.id}" draggable="true" ondragstart="drag(event)" onclick="openPeek(${item.id})" class="glass-card rounded-xl p-4 relative cursor-pointer ${borderClass}">
                            <div class="flex justify-between items-start mb-3">
                                <span class="text-[9px] font-bold tracking-widest px-2 py-0.5 rounded ${tagClass}">${item.assigned_to.toUpperCase()}</span>
                                ${item.priority === 'Critical' ? '<i class="fa-solid fa-fire text-red-500 text-xs animate-pulse"></i>' : ''}
                            </div>
                            <p class="text-sm font-medium text-white mb-3 leading-snug">${item.title} ${hasNotes}</p>
                            <div class="flex justify-between items-center mt-2">
                                <span class="text-[9px] text-white/50 font-mono"><i class="fa-solid fa-crosshairs mr-1"></i>${item.linked_entity}</span>
                            </div>
                        </div>
                    `;
                    colElement.insertAdjacentHTML('beforeend', cardHTML);
                }
            });

            document.getElementById('count-Radar').innerText = counts['Radar'];
            document.getElementById('count-Assigned To').innerText = counts['Assigned To'];
            document.getElementById('count-In Progress').innerText = counts['In Progress'];

            const logo = document.getElementById('syncLogo');
            if (threats > 0) {
                logo.classList.add('threat-active');
                if(!sirenPlaying && !isMuted) { audioSiren.play().catch(()=>{}); sirenPlaying = true; }
            } else {
                logo.classList.remove('threat-active');
                audioSiren.pause(); sirenPlaying = false;
            }
        }

        // --- 7. DRAG & DROP ---
        function drag(ev) { ev.dataTransfer.setData("text", ev.target.id); ev.target.classList.add('dragging'); }
        function allowDrop(ev) { ev.preventDefault(); ev.currentTarget.classList.add('drag-over'); }
        function dragLeave(ev) { ev.currentTarget.classList.remove('drag-over'); }

        async function drop(ev, newStatus) {
            ev.preventDefault();
            ev.currentTarget.classList.remove('drag-over');
            const dataId = ev.dataTransfer.getData("text");
            const dbId = dataId.replace('card-', '');
            
            playSound('click');
            await supabaseClient.from('pulses').update({ status: newStatus }).eq('id', dbId);
        }

        // --- 8. COMMAND ISLAND EXECUTION (Upgraded with Error Handling) ---
        document.getElementById('executeBtn').addEventListener('click', async () => {
            const btn = document.getElementById('executeBtn');
            const title = document.getElementById('pulseTitle').value;
            const target = document.getElementById('pulseTarget').value;
            const tl = document.getElementById('pulseTL').value;
            const priority = document.getElementById('pulsePriority').value;

            if(!title) {
                alert("Alert: Directive title is required.");
                return;
            }

            btn.innerText = "WAIT...";
            const initialStatus = tl !== 'None' ? 'Assigned To' : 'Radar';

            const { error } = await supabaseClient.from('pulses').insert([{ 
                title: title, linked_entity: target || 'Unspecified', 
                assigned_to: tl, priority: priority, status: initialStatus 
            }]);

            if (error) {
                alert("SYSTEM ERROR: " + error.message);
                btn.innerText = "SYNC";
                return;
            }

            document.getElementById('pulseTitle').value = '';
            document.getElementById('pulseTarget').value = '';
            document.getElementById('pulseTL').value = 'None';
            btn.innerText = "SYNC";
            
            showToast(`Transmitted`, `Directive Synced`);
            loadBoard();
        });

        // --- 9. THE PEEK DRAWER ---
        async function openPeek(id) {
            activePeekId = id;
            const { data } = await supabaseClient.from('pulses').select('*').eq('id', id).single();
            if(data) {
                document.getElementById('peekTitle').innerText = data.title;
                document.getElementById('peekEntity').innerText = `#${data.linked_entity}`;
                document.getElementById('peekNotes').value = data.notes || '';
                document.getElementById('peekDrawer').classList.add('drawer-open');
            }
        }
        function closePeek() {
            activePeekId = null;
            document.getElementById('peekDrawer').classList.remove('drawer-open');
        }

        document.getElementById('commitNoteBtn').addEventListener('click', async () => {
            if(!activePeekId) return;
            const text = document.getElementById('peekNotes').value;
            await supabaseClient.from('pulses').update({ notes: text }).eq('id', activePeekId);
            showToast('Note Committed', 'Data saved to active pulse.');
            loadBoard();
            closePeek();
        });

        document.getElementById('archiveBtn').addEventListener('click', async () => {
            if(!activePeekId) return;
            await supabaseClient.from('pulses').delete().eq('id', activePeekId);
            showToast('Archived', 'Directive permanently purged.');
            closePeek();
            loadBoard();
        });

        // --- 10. TOAST SYSTEM ---
        function showToast(header, msg) {
            const toast = document.getElementById('toastAlert');
            document.getElementById('toastHeader').innerText = header;
            document.getElementById('toastMessage').innerText = msg;
            toast.classList.remove('translate-x-[150%]');
            setTimeout(() => toast.classList.add('translate-x-[150%]'), 3000);
        }

        // --- 11. SHIFT PURGE CLOCK ---
        setInterval(() => {
            const now = new Date();
            const hr = now.getHours();
            const mn = now.getMinutes();
            if ((hr === 6 || hr === 14 || hr === 22) && mn === 0) executeShiftPurge();
        }, 60000);

        async function executeShiftPurge() {
            const blackout = document.getElementById('shiftBlackout');
            blackout.classList.remove('opacity-0', 'pointer-events-none');
            await supabaseClient.from('pulses').delete().eq('status', 'Completed');
            setTimeout(() => {
                blackout.classList.add('opacity-0', 'pointer-events-none');
                loadBoard();
            }, 3000);
        }
    </script>
</body>
</html>
