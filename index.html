<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RevBoard | Command Telemetry</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: { void: '#000000', chassis: '#0a0a0a', card: '#111111' },
                    fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap');
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        .antigravity-shadow { box-shadow: 0 0 120px rgba(255, 255, 255, 0.03); }
        .dragging { opacity: 0.5; transform: scale(0.95); transition: all 0.2s ease; }
        .column-dropzone { min-height: 200px; transition: background-color 0.2s ease; }
        .drag-over { background-color: rgba(255, 255, 255, 0.05); border-radius: 0.5rem; }
    </style>
</head>
<body class="bg-void text-gray-300 h-screen w-screen overflow-hidden flex items-center justify-center p-2 sm:p-6 font-sans antialiased selection:bg-white selection:text-black relative">

    <div id="lockScreen" class="absolute inset-0 z-[100] bg-void flex flex-col items-center justify-center transition-all duration-700 ease-in-out">
        <div class="text-center mb-8 transform transition-transform duration-500 hover:scale-105">
            <div class="h-14 w-14 bg-white rounded-full flex items-center justify-center text-black font-bold mx-auto mb-5 shadow-[0_0_40px_rgba(255,255,255,0.4)]">
                <i class="fa-solid fa-bolt text-2xl"></i>
            </div>
            <h1 class="text-3xl font-black tracking-widest text-white uppercase">RevBoard</h1>
            <p class="text-[10px] font-bold text-white/40 uppercase tracking-[0.3em] mt-3">Awaiting Authorization</p>
        </div>

        <div class="bg-chassis/80 backdrop-blur-2xl p-8 rounded-3xl border border-white/10 w-80 antigravity-shadow">
            <div class="flex justify-center gap-5 mb-8" id="pinDots">
                <div class="h-3 w-3 rounded-full bg-black border border-white/30 transition-all duration-300" id="dot-1"></div>
                <div class="h-3 w-3 rounded-full bg-black border border-white/30 transition-all duration-300" id="dot-2"></div>
                <div class="h-3 w-3 rounded-full bg-black border border-white/30 transition-all duration-300" id="dot-3"></div>
                <div class="h-3 w-3 rounded-full bg-black border border-white/30 transition-all duration-300" id="dot-4"></div>
            </div>
            
            <div class="grid grid-cols-3 gap-3" id="numpad">
                <button class="pin-btn h-14 bg-black border border-white/5 rounded-xl text-xl font-light text-white hover:border-white/40 transition-all active:scale-95" data-val="1">1</button>
                <button class="pin-btn h-14 bg-black border border-white/5 rounded-xl text-xl font-light text-white hover:border-white/40 transition-all active:scale-95" data-val="2">2</button>
                <button class="pin-btn h-14 bg-black border border-white/5 rounded-xl text-xl font-light text-white hover:border-white/40 transition-all active:scale-95" data-val="3">3</button>
                <button class="pin-btn h-14 bg-black border border-white/5 rounded-xl text-xl font-light text-white hover:border-white/40 transition-all active:scale-95" data-val="4">4</button>
                <button class="pin-btn h-14 bg-black border border-white/5 rounded-xl text-xl font-light text-white hover:border-white/40 transition-all active:scale-95" data-val="5">5</button>
                <button class="pin-btn h-14 bg-black border border-white/5 rounded-xl text-xl font-light text-white hover:border-white/40 transition-all active:scale-95" data-val="6">6</button>
                <button class="pin-btn h-14 bg-black border border-white/5 rounded-xl text-xl font-light text-white hover:border-white/40 transition-all active:scale-95" data-val="7">7</button>
                <button class="pin-btn h-14 bg-black border border-white/5 rounded-xl text-xl font-light text-white hover:border-white/40 transition-all active:scale-95" data-val="8">8</button>
                <button class="pin-btn h-14 bg-black border border-white/5 rounded-xl text-xl font-light text-white hover:border-white/40 transition-all active:scale-95" data-val="9">9</button>
                <button class="col-start-2 pin-btn h-14 bg-black border border-white/5 rounded-xl text-xl font-light text-white hover:border-white/40 transition-all active:scale-95" data-val="0">0</button>
                <button class="pin-clear h-14 bg-transparent text-xs font-bold text-white/40 hover:text-white uppercase tracking-widest transition-all active:scale-95">CLR</button>
            </div>
            
            <p id="pinError" class="text-red-500 text-[10px] font-bold tracking-widest uppercase text-center mt-6 h-4 opacity-0 transition-opacity">Access Denied</p>
        </div>
    </div>

    <div id="toastAlert" class="fixed top-6 right-6 transform translate-x-[150%] transition-transform duration-300 ease-out bg-white text-black px-6 py-4 rounded-xl shadow-[0_0_40px_rgba(255,255,255,0.2)] z-50 flex items-center gap-4 border border-white/20">
        <i class="fa-solid fa-bolt text-lg"></i>
        <div>
            <p class="text-[10px] font-black uppercase tracking-widest text-black/50" id="toastHeader">System Update</p>
            <p id="toastMessage" class="text-sm font-bold tracking-tight">Action Confirmed</p>
        </div>
    </div>

    <div class="w-full h-full max-w-[1800px] bg-chassis border border-white/10 rounded-2xl overflow-hidden flex flex-col antigravity-shadow relative">
        
        <header class="h-16 border-b border-white/5 flex items-center justify-between px-6 shrink-0 z-10 bg-chassis">
            <div class="flex items-center gap-4 w-1/3">
                <div class="h-6 w-6 bg-white rounded flex items-center justify-center text-black font-bold shadow-[0_0_15px_rgba(255,255,255,0.3)]">
                    <i class="fa-solid fa-layer-group text-xs"></i>
                </div>
                <h1 class="text-lg font-bold tracking-tighter text-white">RevBoard</h1>
            </div>
            
            <div class="flex items-center justify-center gap-8 w-1/3">
                <div class="text-center bg-red-500/10 border border-red-500/20 px-4 py-1 rounded-lg">
                    <p class="text-[9px] font-bold text-red-500 uppercase tracking-widest animate-pulse">Threats</p>
                    <p class="text-lg font-black text-red-500" id="threatCount">0</p>
                </div>
            </div>

            <div class="w-1/3 flex justify-end items-center gap-3">
                <div class="text-right hidden sm:block">
                    <p id="activeUserName" class="text-xs font-bold text-white tracking-widest uppercase">STATION LOCKED</p>
                    <p id="activeUserRole" class="text-[9px] text-white/40 uppercase tracking-widest">Awaiting Identity</p>
                </div>
                <div class="h-9 w-9 rounded-full border border-white/20 flex items-center justify-center text-xs font-bold text-white/70 bg-white/5">
                    <i class="fa-solid fa-user"></i>
                </div>
            </div>
        </header>

        <div class="border-b border-white/5 bg-black/50 p-4 shrink-0 flex items-center gap-3">
            <div class="bg-white text-black text-[10px] font-black uppercase tracking-widest px-3 py-2 rounded">NEW PULSE</div>
            <input type="text" id="pulseTitle" placeholder="Initiate directive or issue..." class="flex-1 bg-transparent border-none text-white text-sm outline-none placeholder-white/20 px-2 font-medium">
            <div class="w-px h-6 bg-white/10 mx-2"></div>
            <input type="text" id="pulseTarget" placeholder="Entity/Target" class="w-32 bg-transparent border-none text-white text-sm outline-none placeholder-white/20 font-medium">
            
            <select id="pulseTL" class="w-40 bg-card border border-white/10 rounded-md px-3 py-1.5 text-xs outline-none text-white focus:border-white/50 appearance-none font-semibold cursor-pointer">
                <option value="None">No Assignment</option>
                <option value="Alex M.">Assign: Alex M.</option>
                <option value="Sarah J.">Assign: Sarah J.</option>
                <option value="Marcus T.">Assign: Marcus T.</option>
                <option value="Elena R.">Assign: Elena R.</option>
            </select>

            <select id="pulsePriority" class="w-28 bg-card border border-white/10 rounded-md px-3 py-1.5 text-xs outline-none text-white focus:border-white/50 appearance-none font-semibold cursor-pointer">
                <option value="Standard">Standard</option>
                <option value="High">High</option>
                <option value="Critical" class="text-red-500">CRITICAL</option>
            </select>

            <button id="executeBtn" class="bg-white hover:bg-gray-200 text-black px-6 py-1.5 rounded-md text-xs font-black tracking-widest uppercase transition-all shadow-[0_0_15px_rgba(255,255,255,0.1)] ml-2">Execute</button>
        </div>

        <main class="flex-1 overflow-x-auto overflow-y-hidden p-6 bg-void/50">
            <div class="flex gap-6 h-full items-start min-w-max">
                
                <div class="w-80 shrink-0 flex flex-col max-h-full">
                    <div class="flex justify-between items-center mb-4 px-1 border-b border-white/10 pb-3">
                        <h3 class="font-bold text-[11px] uppercase tracking-widest text-white/50">Radar</h3>
                        <span class="text-xs font-mono text-white/30 border border-white/10 px-2 rounded" id="count-Radar">0</span>
                    </div>
                    <div class="flex-1 overflow-y-auto space-y-3 scrollbar-hide pb-10 column-dropzone" id="col-Radar" ondrop="drop(event, 'Radar')" ondragover="allowDrop(event)" ondragleave="dragLeave(event)"></div>
                </div>

                <div class="w-80 shrink-0 flex flex-col max-h-full">
                    <div class="flex justify-between items-center mb-4 px-1 border-b border-white/10 pb-3">
                        <h3 class="font-bold text-[11px] uppercase tracking-widest text-white">Assigned To</h3>
                        <span class="text-xs font-mono text-white border border-white/30 px-2 rounded" id="count-Assigned To">0</span>
                    </div>
                    <div class="flex-1 overflow-y-auto space-y-3 scrollbar-hide pb-10 column-dropzone" id="col-Assigned To" ondrop="drop(event, 'Assigned To')" ondragover="allowDrop(event)" ondragleave="dragLeave(event)"></div>
                </div>

                <div class="w-80 shrink-0 flex flex-col max-h-full">
                    <div class="flex justify-between items-center mb-4 px-1 border-b border-white/10 pb-3">
                        <h3 class="font-bold text-[11px] uppercase tracking-widest text-white/50 flex items-center gap-2"><i class="fa-solid fa-circle-notch animate-spin text-[10px]"></i> In Progress</h3>
                        <span class="text-xs font-mono text-white/30 border border-white/10 px-2 rounded" id="count-In Progress">0</span>
                    </div>
                    <div class="flex-1 overflow-y-auto space-y-3 scrollbar-hide pb-10 column-dropzone" id="col-In Progress" ondrop="drop(event, 'In Progress')" ondragover="allowDrop(event)" ondragleave="dragLeave(event)"></div>
                </div>

                <div class="w-80 shrink-0 flex flex-col max-h-full">
                    <div class="flex justify-between items-center mb-4 px-1 border-b border-white/10 pb-3">
                        <h3 class="font-bold text-[11px] uppercase tracking-widest text-white/30">Completed</h3>
                    </div>
                    <div class="flex-1 overflow-y-auto space-y-3 scrollbar-hide pb-10 column-dropzone opacity-50" id="col-Completed" ondrop="drop(event, 'Completed')" ondragover="allowDrop(event)" ondragleave="dragLeave(event)"></div>
                </div>

            </div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // --- PUT YOUR KEY IN THE QUOTES BELOW ---
        const supabaseUrl = 'https://pmhmuzctbstrhtmwxlay.supabase.co';
        const supabaseKey = 'sb_publishable_8dtRYPrztDbEt3bZhU3ibQ_5PAt_FsP';
        const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

        let currentUser = null;
        let currentPin = '';

        // --- 1. PIN PAD LOGIC ---
        document.querySelectorAll('.pin-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                if(currentPin.length < 4) {
                    currentPin += e.target.getAttribute('data-val');
                    updatePinDots();
                    if(currentPin.length === 4) verifyPin();
                }
            });
        });

        document.querySelector('.pin-clear').addEventListener('click', () => {
            currentPin = '';
            updatePinDots();
            document.getElementById('pinError').style.opacity = '0';
        });

        function updatePinDots() {
            for(let i=1; i<=4; i++) {
                const dot = document.getElementById(`dot-${i}`);
                if(i <= currentPin.length) {
                    dot.classList.replace('bg-black', 'bg-white');
                    dot.classList.add('shadow-[0_0_15px_rgba(255,255,255,0.8)]');
                } else {
                    dot.classList.replace('bg-white', 'bg-black');
                    dot.classList.remove('shadow-[0_0_15px_rgba(255,255,255,0.8)]');
                }
            }
        }

        async function verifyPin() {
            const { data, error } = await supabaseClient
                .from('floor_users')
                .select('*')
                .eq('pin', currentPin)
                .single();

            if (data) {
                // PIN MATCHES! Unlock the system
                currentUser = data;
                const lockScreen = document.getElementById('lockScreen');
                lockScreen.classList.add('opacity-0', 'pointer-events-none', 'scale-110');
                setTimeout(() => lockScreen.style.display = 'none', 700);
                
                // Update Top Right HUD with their name
                document.getElementById('activeUserName').innerText = data.name.toUpperCase();
                document.getElementById('activeUserRole').innerText = data.role;
                
                showToast(`Station Unlocked`, `Welcome back, ${data.name}`);
                loadBoard(); 
            } else {
                // PIN FAILED
                document.getElementById('pinError').style.opacity = '1';
                setTimeout(() => {
                    currentPin = '';
                    updatePinDots();
                    document.getElementById('pinError').style.opacity = '0';
                }, 1000);
            }
        }

        // --- 2. LOAD DATA & RENDER CARDS ---
        async function loadBoard() {
            const { data, error } = await supabaseClient.from('pulses').select('*').order('id', { ascending: false });
            if (error) { console.error("Error loading data", error); return; }

            document.getElementById('col-Radar').innerHTML = '';
            document.getElementById('col-Assigned To').innerHTML = '';
            document.getElementById('col-In Progress').innerHTML = '';
            document.getElementById('col-Completed').innerHTML = '';

            let threatCount = 0;
            let counts = { 'Radar': 0, 'Assigned To': 0, 'In Progress': 0 };

            data.forEach(item => {
                const colElement = document.getElementById(`col-${item.status}`);
                if(colElement) {
                    if (item.priority === 'Critical' && item.status !== 'Completed') threatCount++;
                    if (counts[item.status] !== undefined) counts[item.status]++;

                    const borderClass = item.priority === 'Critical' ? 'border-red-500/50 shadow-[0_0_15px_rgba(239,68,68,0.2)]' : 'border-white/10';
                    const tagClass = item.assigned_to !== 'None' ? `bg-white text-black` : `border border-white/20 text-white/50`;
                    
                    const cardHTML = `
                        <div id="card-${item.id}" draggable="true" ondragstart="drag(event)" class="bg-card border ${borderClass} rounded-lg p-4 relative group cursor-grab active:cursor-grabbing hover:border-white/30 transition-all">
                            <div class="flex justify-between items-start mb-2">
                                <span class="text-[9px] font-black tracking-widest px-2 py-0.5 rounded ${tagClass}">${item.assigned_to.toUpperCase()}</span>
                                ${item.priority === 'Critical' ? '<i class="fa-solid fa-fire text-red-500 text-xs"></i>' : ''}
                            </div>
                            <p class="text-sm font-medium text-white mb-3">${item.title}</p>
                            <div class="flex justify-between items-center">
                                <span class="text-[10px] text-white/40 font-mono">${item.linked_entity}</span>
                            </div>
                        </div>
                    `;
                    colElement.insertAdjacentHTML('beforeend', cardHTML);
                }
            });

            document.getElementById('threatCount').innerText = threatCount;
            document.getElementById('count-Radar').innerText = counts['Radar'];
            document.getElementById('count-Assigned To').innerText = counts['Assigned To'];
            document.getElementById('count-In Progress').innerText = counts['In Progress'];
        }

        // --- 3. DRAG AND DROP MUSCLE ---
        function drag(ev) {
            ev.dataTransfer.setData("text", ev.target.id);
            ev.target.classList.add('dragging');
        }
        function allowDrop(ev) { ev.preventDefault(); ev.currentTarget.classList.add('drag-over'); }
        function dragLeave(ev) { ev.currentTarget.classList.remove('drag-over'); }

        async function drop(ev, newStatus) {
            ev.preventDefault();
            ev.currentTarget.classList.remove('drag-over');
            const dataId = ev.dataTransfer.getData("text");
            const dbId = dataId.replace('card-', '');
            
            const card = document.getElementById(dataId);
            card.classList.remove('dragging');
            ev.currentTarget.appendChild(card);

            showToast(`Status Updated`, `Moved to ${newStatus}`);
            await supabaseClient.from('pulses').update({ status: newStatus }).eq('id', dbId);
            loadBoard();
        }

        // --- 4. EXECUTE COMMAND BAR ---
        document.getElementById('executeBtn').addEventListener('click', async () => {
            const btn = document.getElementById('executeBtn');
            const title = document.getElementById('pulseTitle').value;
            const target = document.getElementById('pulseTarget').value;
            const tl = document.getElementById('pulseTL').value;
            const priority = document.getElementById('pulsePriority').value;

            if(!title) return alert("Directive title required.");

            btn.innerText = "WAIT";
            const initialStatus = tl !== 'None' ? 'Assigned To' : 'Radar';

            const { error } = await supabaseClient.from('pulses').insert([{ 
                title: title, linked_entity: target || 'Unspecified', 
                assigned_to: tl, priority: priority, status: initialStatus 
            }]);

            if (!error) {
                document.getElementById('pulseTitle').value = '';
                document.getElementById('pulseTarget').value = '';
                showToast(`Directive Launched`, tl !== 'None' ? `Pushed to ${tl}` : `Logged to Radar`);
                loadBoard();
            }
            btn.innerText = "EXECUTE";
        });

        // Toast Alert System
        function showToast(header, msg) {
            const toast = document.getElementById('toastAlert');
            document.getElementById('toastHeader').innerText = header;
            document.getElementById('toastMessage').innerText = msg;
            toast.classList.remove('translate-x-[150%]');
            setTimeout(() => toast.classList.add('translate-x-[150%]'), 3000);
        }
    </script>
</body>
</html>
